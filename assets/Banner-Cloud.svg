<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f6fc" />
      <stop offset="100%" stop-color="#8b949e" />
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="#0d1117" />

  <g font-family="monospace, sans-serif" font-size="12" font-weight="bold" opacity="0.3">
    <g transform="translate(40, 50)">
      <text x="0" y="0" fill="#3fb950">[OK]</text><text x="40" y="0" fill="#8b949e">aws_instance.web_server_01</text><text x="240" y="0" fill="#484f58">(1.2s)</text>
      <text x="0" y="30" fill="#3fb950">[OK]</text><text x="40" y="30" fill="#8b949e">aws_s3_bucket.static_assets</text><text x="240" y="30" fill="#484f58">(0.8s)</text>
      <text x="0" y="60" fill="#3fb950">[OK]</text><text x="40" y="60" fill="#8b949e">aws_iam_role_policy_attach</text><text x="240" y="60" fill="#484f58">(0.4s)</text>
      <text x="0" y="90" fill="#3fb950">[OK]</text><text x="40" y="90" fill="#8b949e">aws_vpc.main_network_hub</text><text x="240" y="90" fill="#484f58">(2.1s)</text>
    </g>
    <g transform="translate(830, 160)">
      <text x="0" y="0" fill="#3fb950">[OK]</text><text x="50" y="0" fill="#8b949e">deploy_serverless_api_v2</text><text x="250" y="0" fill="#484f58">(3.4s)</text>
      <text x="0" y="30" fill="#d29922">[WARN]</text><text x="50" y="30" fill="#8b949e">high_latency_api_gateway</text><text x="250" y="30" fill="#484f58">(890ms)</text>
      <text x="0" y="60" fill="#3fb950">[OK]</text><text x="50" y="60" fill="#8b949e">scale_asg_capacity_to_3</text><text x="250" y="60" fill="#484f58">(5.0s)</text>
      <text x="0" y="90" fill="#3fb950">[OK]</text><text x="50" y="90" fill="#8b949e">rds_postgres_snapshot_done</text><text x="250" y="90" fill="#484f58">(12.4s)</text>
    </g>
  </g>

  <g transform="translate(40, 260)">
    <rect x="3" y="-14" width="245" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="12" y="2" font-family="monospace, sans-serif" font-size="12" fill="#58a6ff" font-weight="bold">➜</text>
    <text x="28" y="2" font-family="monospace, sans-serif" font-size="12" fill="#c9d1d9">terraform apply -auto-approve</text>
  </g>

  <g transform="translate(1000, 40)">
    <rect x="-10" y="-14" width="147" height="24" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="4" cy="-2" r="4" fill="#3fb950" filter="url(#glow-green)" />
    <text x="16" y="2" font-family="monospace, sans-serif" font-size="11" fill="#8b949e" font-weight="bold" letter-spacing="1">UPTIME : 99.99%</text>
  </g>

  <text x="600" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#text-gradient)" text-anchor="middle" letter-spacing="1">Cloud</text>

  <g transform="translate(480, 230)">
    <polygon points="0,-32 32,0 0,32 -32,0" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <g transform="translate(0, 0)" stroke="#58a6ff" stroke-width="2" fill="none" filter="url(#glow-blue)">
      <ellipse cx="0" cy="-6" rx="8" ry="3" />
      <path d="M-8,-6 v6 a8,3 0 0,0 16,0 v-6" />
      <path d="M-8,0 v6 a8,3 0 0,0 16,0 v-6" />
    </g>
  </g>

  <g transform="translate(600, 230)">
    <polygon points="0,-32 32,0 0,32 -32,0" fill="#3fb950" fill-opacity="0.1" stroke="#3fb950" stroke-width="2" filter="url(#glow-green)"/>
    <g transform="translate(0, 2)" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-6,4 C-12,4 -12,-3 -6,-3 C-6,-10 6,-10 8,-3 C14,-3 14,4 8,4 Z" />
    </g>
  </g>

  <g transform="translate(720, 230)">
    <polygon points="0,-32 32,0 0,32 -32,0" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <g transform="translate(0, 0)" stroke="#bc8cff" stroke-width="1.5" fill="none" stroke-linejoin="round" filter="url(#glow-purple)">
      <path d="M-6,-6 L6,-2 L0,8 Z" />
      <path d="M-6,-6 L0,0 L0,8" />
      <line x1="0" y1="0" x2="6" y2="-2" />
      <circle cx="-6" cy="-6" r="2" fill="#0d1117"/>
      <circle cx="6" cy="-2" r="2" fill="#0d1117"/>
      <circle cx="0" cy="8" r="2" fill="#0d1117"/>
      <circle cx="0" cy="0" r="1.5" fill="#bc8cff" stroke="none"/>
    </g>
  </g>

  <g stroke="#30363d" stroke-width="2" stroke-dasharray="4,4">
    <line x1="512" y1="230" x2="568" y2="230" />
    <line x1="632" y1="230" x2="688" y2="230" />
  </g>

</svg>
