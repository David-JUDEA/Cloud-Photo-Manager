services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3, lambda
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  backend:
    build: ./Back-end
    ports:
      - "5001:5001"
    depends_on:
      - localstack
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566

  frontend:
    build: ./Front-end
    ports:
      - "8080:80"
